<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>耳乐</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --panel: #161616; --card: #1e1e1e; --border: #2a2a2a;
    --text: #e8e8e8; --muted: #666; --accent: #c084fc; --accent2: #a855f7;
    --active: #ffffff;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', sans-serif;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Top bar ── */
  .topbar { padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
  .search-wrap { flex: 1; display: flex; gap: 8px; align-items: center; }
  .search-input { flex: 1; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 9px 14px; font-size: 14px; outline: none; }
  .search-input:focus { border-color: var(--accent2); }
  .search-btn { background: var(--accent2); color: #fff; border: none; border-radius: 10px;
    padding: 9px 18px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .search-btn:hover { background: var(--accent); }
  .platform-btns { display: flex; gap: 4px; }
  .pbtn { background: var(--card); border: 1px solid var(--border); color: var(--muted);
    padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .pbtn.active { border-color: var(--accent2); color: var(--accent); }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Left: results ── */
  .sidebar { width: 300px; flex-shrink: 0; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; }
  .results { flex: 1; overflow-y: auto; padding: 8px; }
  .results::-webkit-scrollbar { width: 4px; }
  .results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .result-item { padding: 10px 12px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
  .result-item:hover { background: var(--card); }
  .result-item.playing { background: var(--card); border: 1px solid var(--border); }
  .result-cover { width: 40px; height: 40px; border-radius: 6px; background: var(--border);
    object-fit: cover; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 18px; }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; }
  .result-artist { font-size: 11px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-meta { text-align: right; flex-shrink: 0; }
  .result-dur { font-size: 11px; color: var(--muted); }
  .platform-tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-top: 2px; display: inline-block; }
  .tag-kg { background: #1a2744; color: #4d8cf5; }
  .tag-ne { background: #3b1111; color: #e85555; }
  .tag-qq { background: #1a2e44; color: #3bbdf5; }
  .word-badge { font-size: 10px; color: var(--accent); }
  .empty-hint { color: var(--muted); font-size: 13px; text-align: center; padding: 40px 20px; }

  /* ── Right: player + lyrics ── */
  .player-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Lyrics area */
  .lyrics-area { flex: 1; overflow-y: auto; padding: 30px 40px; position: relative; }
  .lyrics-area::-webkit-scrollbar { width: 4px; }
  .lyrics-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .lyric-line { padding: 8px 0; font-size: 15px; color: var(--muted); cursor: pointer;
    transition: color 0.3s, font-size 0.3s; line-height: 1.6; }
  .lyric-line:hover { color: #999; }
  .lyric-line.active { color: var(--active); font-size: 17px; font-weight: 500; }
  .lyric-word { display: inline; }
  .lyric-word.lit { color: var(--accent); }
  .lyrics-placeholder { color: var(--muted); font-size: 14px; text-align: center;
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); }

  /* Player bar */
  .player-bar { border-top: 1px solid var(--border); padding: 14px 24px; flex-shrink: 0;
    background: var(--panel); }
  .now-playing { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .np-cover { width: 44px; height: 44px; border-radius: 8px; background: var(--border);
    object-fit: cover; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .np-info { flex: 1; min-width: 0; }
  .np-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .np-status { font-size: 11px; color: var(--accent); margin-top: 2px; }
  .controls { display: flex; align-items: center; gap: 16px; }
  .ctrl-btn { background: none; border: none; color: var(--text); cursor: pointer; font-size: 20px;
    padding: 4px; display: flex; align-items: center; opacity: 0.8; }
  .ctrl-btn:hover { opacity: 1; }
  .play-btn { width: 40px; height: 40px; background: var(--accent2); border-radius: 50%;
    border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; }
  .play-btn:hover { background: var(--accent); }
  .progress-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
  .time { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; width: 35px; }
  .time.end { text-align: right; }
  .progress { flex: 1; height: 4px; background: var(--border); border-radius: 2px;
    cursor: pointer; position: relative; }
  .progress-fill { height: 100%; background: var(--accent2); border-radius: 2px;
    pointer-events: none; transition: width 0.1s linear; }
  .progress:hover .progress-fill { background: var(--accent); }
  .volume-wrap { display: flex; align-items: center; gap: 6px; }
  .volume-icon { font-size: 14px; color: var(--muted); }
  .volume-slider { width: 70px; height: 4px; accent-color: var(--accent2); cursor: pointer; }
  .loading { color: var(--muted); font-size: 12px; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">耳乐</div>
  <div class="search-wrap">
    <input class="search-input" id="q" placeholder="搜索歌曲、歌手..." />
    <button class="search-btn" onclick="doSearch()">搜索</button>
  </div>
  <div class="platform-btns">
    <button class="pbtn active" data-p="kg" onclick="togglePlatform(this)">酷狗</button>
    <button class="pbtn active" data-p="ne" onclick="togglePlatform(this)">网易云</button>
    <button class="pbtn active" data-p="qq" onclick="togglePlatform(this)">QQ</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar: results -->
  <div class="sidebar">
    <div class="results" id="results">
      <div class="empty-hint">搜索你喜欢的音乐</div>
    </div>
  </div>

  <!-- Player panel -->
  <div class="player-panel">
    <div class="lyrics-area" id="lyricsArea">
      <div class="lyrics-placeholder" id="lyricsPlaceholder">选择一首歌曲开始播放</div>
    </div>

    <div class="player-bar">
      <div class="now-playing">
        <div class="np-cover" id="npCover">🎵</div>
        <div class="np-info">
          <div class="np-name" id="npName">未在播放</div>
          <div class="np-artist" id="npArtist">—</div>
          <div class="np-status" id="npStatus"></div>
        </div>
        <div class="volume-wrap">
          <span class="volume-icon">🔊</span>
          <input class="volume-slider" type="range" min="0" max="1" step="0.05" value="0.8"
            oninput="audio.volume = this.value" />
        </div>
      </div>
      <div class="controls">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <div class="progress-wrap">
          <span class="time" id="timeNow">0:00</span>
          <div class="progress" id="progress" onclick="seek(event)">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
          <span class="time end" id="timeEnd">0:00</span>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="audioEl" preload="auto"></audio>

<script>
const audio = document.getElementById('audioEl');
audio.volume = 0.8;

let lyrics = [];        // [{time, text, words:[{time,dur,text}]|null}]
let currentLineIdx = -1;
let activePlatforms = new Set(['kg', 'ne', 'qq']);
let isUserSeeking = false;

// ── Platform toggles ──────────────────────────────────────────────────────────
function togglePlatform(btn) {
  const p = btn.dataset.p;
  if (activePlatforms.has(p)) { activePlatforms.delete(p); btn.classList.remove('active'); }
  else { activePlatforms.add(p); btn.classList.add('active'); }
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const platforms = [...activePlatforms].join(',');
  const el = document.getElementById('results');
  el.innerHTML = '<div class="empty-hint loading">搜索中...</div>';
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&p=${platforms}&n=8`);
    const songs = await r.json();
    renderResults(songs);
  } catch (e) {
    el.innerHTML = `<div class="empty-hint">搜索失败：${e.message}</div>`;
  }
}

function renderResults(songs) {
  const el = document.getElementById('results');
  if (!songs.length) { el.innerHTML = '<div class="empty-hint">没有找到结果</div>'; return; }
  el.innerHTML = songs.map((s, i) => `
    <div class="result-item" id="ri-${i}" onclick="playSong(${i})">
      <div class="result-cover">${platformEmoji(s.platform)}</div>
      <div class="result-info">
        <div class="result-name">${esc(s.name)}</div>
        <div class="result-artist">${esc(s.artist)}</div>
      </div>
      <div class="result-meta">
        <div class="result-dur">${fmtDur(s.duration)}</div>
        <span class="platform-tag tag-${s.platform}">${s.label}</span>
      </div>
    </div>
  `).join('');
  window._songs = songs;
}

// ── Play ──────────────────────────────────────────────────────────────────────
async function playSong(idx) {
  const songs = window._songs || [];
  const s = songs[idx];
  if (!s) return;

  // Highlight selected
  document.querySelectorAll('.result-item').forEach(el => el.classList.remove('playing'));
  document.getElementById(`ri-${idx}`)?.classList.add('playing');

  // Update now-playing info
  document.getElementById('npName').textContent = s.name;
  document.getElementById('npArtist').textContent = s.artist;
  document.getElementById('npStatus').textContent = '加载中...';
  document.getElementById('npCover').textContent = platformEmoji(s.platform);

  lyrics = [];
  currentLineIdx = -1;
  renderLyrics();

  const meta = encodeURIComponent(JSON.stringify(s._meta));

  // Fetch audio + lyrics in parallel
  const [audioRes, lyricsRes] = await Promise.allSettled([
    fetch(`/api/audio?p=${s.platform}&m=${meta}`).then(r => r.json()),
    fetch(`/api/lyrics?p=${s.platform}&m=${meta}`).then(r => r.json()),
  ]);

  // Audio
  if (audioRes.status === 'fulfilled' && audioRes.value.url) {
    audio.src = audioRes.value.url;
    audio.play().then(() => {
      document.getElementById('npStatus').textContent = '正在播放';
      document.getElementById('playBtn').textContent = '⏸';
    }).catch(e => {
      document.getElementById('npStatus').textContent = '播放失败（音频受限）';
    });
  } else {
    document.getElementById('npStatus').textContent = '音频不可用';
  }

  // Lyrics
  if (lyricsRes.status === 'fulfilled' && lyricsRes.value.content) {
    const { format, content } = lyricsRes.value;
    if (format === 'krc') lyrics = parseKRC(content);
    else if (format === 'yrc') lyrics = parseYRC(content);
    else lyrics = parseLRC(content);
    renderLyrics();
    document.getElementById('npStatus').textContent =
      document.getElementById('npStatus').textContent === '正在播放'
        ? `正在播放 · ${format === 'lrc' ? '逐行' : '逐字'}歌词` : document.getElementById('npStatus').textContent;
  } else {
    document.getElementById('lyricsArea').innerHTML =
      '<div class="lyrics-placeholder">暂无歌词</div>';
  }
}

// ── Lyrics parsers ────────────────────────────────────────────────────────────
function parseLRC(text) {
  const lines = [];
  for (const line of text.split('\n')) {
    const m = line.match(/\[(\d+):(\d+\.?\d*)\](.*)/);
    if (m) {
      const t = parseInt(m[1]) * 60 + parseFloat(m[2]);
      const txt = m[3].trim();
      if (txt) lines.push({ time: t, text: txt, words: null });
    }
  }
  return lines.sort((a, b) => a.time - b.time);
}

function parseKRC(text) {
  const lines = [];
  for (const line of text.split('\n')) {
    const lm = line.match(/^\[(\d+),(\d+)\](.*)/);
    if (!lm) continue;
    const lineStart = parseInt(lm[1]) / 1000;
    const words = [];
    let fullText = '';
    const wr = /<(\d+),(\d+),\d+>([^<]*)/g;
    let m;
    while ((m = wr.exec(lm[3])) !== null) {
      const w = { time: lineStart + parseInt(m[1])/1000, dur: parseInt(m[2])/1000, text: m[3] };
      words.push(w);
      fullText += m[3];
    }
    if (fullText.trim()) lines.push({ time: lineStart, text: fullText, words });
  }
  return lines.sort((a, b) => a.time - b.time);
}

function parseYRC(text) {
  const lines = [];
  for (const line of text.split('\n')) {
    const lm = line.match(/^\[(\d+),(\d+)\](.*)/);
    if (!lm) continue;
    const lineStart = parseInt(lm[1]) / 1000;
    const words = [];
    let fullText = '';
    const wr = /\((\d+),(\d+),\d+\)([^(]*)/g;
    let m;
    while ((m = wr.exec(lm[3])) !== null) {
      words.push({ time: parseInt(m[1])/1000, dur: parseInt(m[2])/1000, text: m[3] });
      fullText += m[3];
    }
    if (fullText.trim()) lines.push({ time: lineStart, text: fullText, words });
  }
  return lines.sort((a, b) => a.time - b.time);
}

// ── Lyrics render ─────────────────────────────────────────────────────────────
function renderLyrics() {
  const area = document.getElementById('lyricsArea');
  if (!lyrics.length) {
    area.innerHTML = '<div class="lyrics-placeholder" id="lyricsPlaceholder">选择一首歌曲开始播放</div>';
    return;
  }
  area.innerHTML = lyrics.map((line, i) => {
    if (line.words) {
      const wordsHtml = line.words.map((w, wi) =>
        `<span class="lyric-word" data-li="${i}" data-wi="${wi}">${esc(w.text)}</span>`
      ).join('');
      return `<div class="lyric-line" data-i="${i}" onclick="seekTo(${line.time})">${wordsHtml}</div>`;
    }
    return `<div class="lyric-line" data-i="${i}" onclick="seekTo(${line.time})">${esc(line.text)}</div>`;
  }).join('');
}

function updateLyrics(t) {
  if (!lyrics.length) return;

  // Find current line
  let li = -1;
  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (t >= lyrics[i].time) { li = i; break; }
  }

  if (li !== currentLineIdx) {
    // Remove old active
    if (currentLineIdx >= 0) {
      const old = document.querySelector(`.lyric-line[data-i="${currentLineIdx}"]`);
      if (old) { old.classList.remove('active'); old.querySelectorAll('.lyric-word').forEach(w => w.classList.remove('lit')); }
    }
    currentLineIdx = li;
    if (li >= 0) {
      const el = document.querySelector(`.lyric-line[data-i="${li}"]`);
      if (el) {
        el.classList.add('active');
        // Auto-scroll: center current line
        const areaEl = document.getElementById('lyricsArea');
        const offset = el.offsetTop - areaEl.clientHeight / 2 + el.clientHeight / 2;
        areaEl.scrollTo({ top: offset, behavior: 'smooth' });
      }
    }
  }

  // Word-level highlight
  if (li >= 0 && lyrics[li].words) {
    const lineEl = document.querySelector(`.lyric-line[data-i="${li}"]`);
    if (lineEl) {
      lyrics[li].words.forEach((w, wi) => {
        const el = lineEl.querySelector(`[data-wi="${wi}"]`);
        if (!el) return;
        const isLit = t >= w.time && t < w.time + w.dur + 0.05;
        el.classList.toggle('lit', isLit);
      });
    }
  }
}

// ── Audio controls ────────────────────────────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  if (isUserSeeking) return;
  const t = audio.currentTime, d = audio.duration || 0;
  document.getElementById('timeNow').textContent = fmtDur(t);
  document.getElementById('timeEnd').textContent = fmtDur(d);
  document.getElementById('progressFill').style.width = d ? `${(t/d)*100}%` : '0%';
  updateLyrics(t);
});

audio.addEventListener('ended', () => {
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('npStatus').textContent = '已结束';
});

audio.addEventListener('error', () => {
  document.getElementById('npStatus').textContent = '播放出错';
});

function togglePlay() {
  if (audio.paused) {
    audio.play();
    document.getElementById('playBtn').textContent = '⏸';
  } else {
    audio.pause();
    document.getElementById('playBtn').textContent = '▶';
  }
}

function seek(e) {
  const bar = document.getElementById('progress');
  const ratio = e.offsetX / bar.clientWidth;
  if (audio.duration) audio.currentTime = ratio * audio.duration;
}

function seekTo(time) {
  audio.currentTime = time;
  if (audio.paused) audio.play();
  document.getElementById('playBtn').textContent = '⏸';
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDur(s) {
  if (!s || isNaN(s)) return '0:00';
  s = Math.floor(s);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function platformEmoji(p) {
  return { kg: '🎵', ne: '🍀', qq: '🎶' }[p] || '🎵';
}
</script>
</body>
</html>
